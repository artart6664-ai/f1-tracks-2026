<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>F1 2026 Tracks Schedule</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root{
      --bg:#0a0f1c;
      --panel:#0f1626;
      --panel2:#121b2d;
      --line:#1d2740;
      --text:#ffffff;
      --muted:#9ca6b8;
      --red:#e10600;
      --red2:#ff3b30;
      --chip:#172038;
    }

    html,body{
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      min-height:100vh;
      overflow-x:hidden;
      -webkit-tap-highlight-color:transparent;
    }

    .app{ min-height:100vh; }

    .hidden{ display:none !important; }

    .topbar{
      position:sticky;
      top:0;
      z-index:100;
      background:linear-gradient(180deg,#0d1324 0%, #0a0f1c 100%);
      border-bottom:2px solid var(--red);
      padding:14px 12px 12px;
    }

    .logo-wrap{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      font-size:30px;
      font-weight:900;
      letter-spacing:1px;
      text-transform:uppercase;
    }

    .logo-f1{ color:var(--red); }

    .subtitle{
      text-align:center;
      margin-top:6px;
      color:var(--muted);
      font-size:13px;
    }

    .timezone-info{
      margin-top:8px;
      text-align:center;
      color:var(--muted);
      font-size:12px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      padding:12px;
    }

    .stat-item{
      background:linear-gradient(145deg,var(--panel),var(--panel2));
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      text-align:center;
      cursor:pointer;
      transition:all .18s ease;
    }

    .stat-item:active{
      transform:scale(.97);
      border-color:var(--red);
      background:rgba(225,6,0,.08);
    }

    .stat-number{
      color:var(--red);
      font-size:20px;
      font-weight:900;
      margin-bottom:4px;
    }

    .stat-label{
      color:var(--muted);
      font-size:11px;
      font-weight:700;
      letter-spacing:.6px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      padding:12px;
    }

    .race-card{
      background:linear-gradient(145deg,var(--panel),var(--panel2));
      border:1px solid var(--line);
      border-radius:16px;
      overflow:hidden;
      cursor:pointer;
      transition:all .18s ease;
      position:relative;
    }

    .race-card:active{
      transform:scale(.985);
      border-color:var(--red);
    }

    .race-card::before{
      content:"";
      position:absolute;
      left:0; top:0;
      width:4px; height:100%;
      background:linear-gradient(180deg,var(--red),var(--red2));
      opacity:0;
      transition:opacity .18s ease;
    }

    .race-card:active::before{ opacity:1; }

    .card-head{
      display:flex;
      gap:12px;
      padding:14px 14px 8px;
      align-items:flex-start;
    }

    .flag{
      font-size:34px;
      width:44px;
      text-align:center;
      flex-shrink:0;
      line-height:1;
    }

    .card-meta{
      flex:1;
      min-width:0;
    }

    .meta-top{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.6px;
    }

    .date{
      margin-top:4px;
      color:var(--red);
      font-size:20px;
      font-weight:900;
      letter-spacing:1px;
    }

    .country{
      margin-top:2px;
      font-size:28px;
      line-height:1;
      font-weight:900;
      text-transform:uppercase;
      word-break:break-word;
    }

    .track-wrap{ padding:10px 14px 8px; }

    .track-image{
      width:100%;
      height:145px;
      object-fit:contain;
      display:block;
      background:#0b111e;
      border:1px solid #162036;
      border-radius:12px;
      padding:10px;
    }

    .track-name{
      text-align:center;
      padding:0 14px 14px;
      color:#d6dbe5;
      font-size:15px;
    }

    .footer{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      padding:18px 12px 26px;
    }

    .page{
      display:none;
      min-height:100vh;
      animation:slideIn .22s ease;
    }

    .page.active{ display:block; }

    @keyframes slideIn{
      from{ opacity:0; transform:translateX(40px); }
      to{ opacity:1; transform:translateX(0); }
    }

    .back-btn{
      width:100%;
      border:none;
      background:transparent;
      color:white;
      text-align:left;
      font-size:16px;
      font-weight:600;
      padding:16px 14px;
      border-bottom:1px solid var(--line);
      cursor:pointer;
    }

    .back-btn:active{ background:rgba(225,6,0,.08); }

    .detail-header, .list-header{
      background:linear-gradient(145deg,var(--panel),var(--panel2));
      border-bottom:2px solid var(--red);
      padding:18px 14px 14px;
    }

    .detail-round{
      font-size:12px;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:6px;
      letter-spacing:.6px;
    }

    .detail-title, .list-title{
      font-size:30px;
      font-weight:900;
      text-transform:uppercase;
      line-height:1;
      margin-bottom:8px;
    }

    .detail-circuit{
      color:#d6dbe5;
      margin-bottom:8px;
      font-size:15px;
    }

    .detail-date{
      color:var(--red);
      font-weight:800;
      font-size:16px;
    }

    .detail-track-wrap{ padding:14px; }

    .detail-track-image{
      width:100%;
      max-height:180px;
      object-fit:contain;
      display:block;
      background:#0b111e;
      border:1px solid #162036;
      border-radius:14px;
      padding:12px;
    }

    .section-title{
      padding:0 14px 10px;
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.8px;
      font-weight:800;
    }

    .schedule{
      padding-bottom:12px;
    }

    .schedule-item, .list-item{
      padding:16px 14px;
      border-bottom:1px solid var(--line);
      background:transparent;
    }

    .schedule-item:last-child, .list-item:last-child{ border-bottom:none; }

    .session-name{
      font-size:17px;
      font-weight:700;
      color:white;
      margin-bottom:6px;
    }

    .session-date{
      color:var(--muted);
      font-size:14px;
      margin-bottom:6px;
    }

    .session-time{
      color:var(--red);
      font-size:20px;
      font-weight:900;
    }

    .original-time{
      color:var(--muted);
      font-size:12px;
      font-weight:600;
      margin-left:6px;
    }

    .share-btn{
      width:calc(100% - 28px);
      margin:14px;
      border:none;
      border-radius:14px;
      padding:15px;
      background:linear-gradient(135deg,var(--red),var(--red2));
      color:white;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
    }

    .share-btn:active{ transform:scale(.985); }

    .list-subtitle{
      color:var(--red);
      font-weight:800;
      font-size:15px;
    }

    .list-item{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .list-number{
      width:34px;
      flex-shrink:0;
      text-align:center;
      color:var(--red);
      font-size:18px;
      font-weight:900;
      background:var(--chip);
      border-radius:10px;
      padding:6px 0;
    }

    .list-content{
      color:white;
      font-size:16px;
      line-height:1.3;
    }

    .chips{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      padding:0 14px 14px;
    }

    .chip{
      padding:8px 10px;
      background:var(--chip);
      border:1px solid var(--line);
      border-radius:999px;
      color:#d8deea;
      font-size:12px;
      font-weight:700;
    }

    @media (min-width:768px){
      .grid{ grid-template-columns:repeat(2,1fr); }
    }

    @media (min-width:1180px){
      .grid{ grid-template-columns:repeat(3,1fr); }
    }
  </style>
</head>

    const monthMap = {
      'января':0,'февраля':1,'марта':2,'апреля':3,'мая':4,'июня':5,
      'июля':6,'августа':7,'сентября':8,'октября':9,'ноября':10,'декабря':11
    };

    function placeholderSvg(text='Track layout'){
      return `data:image/svg+xml;utf8,
      <svg xmlns='http://www.w3.org/2000/svg' width='600' height='300'>
        <rect width='100%' height='100%' fill='%230b111e'/>
        <rect x='10' y='10' width='580' height='280' rx='18' ry='18' fill='none' stroke='%23162036'/>
        <text x='50%' y='50%' font-size='28' text-anchor='middle' fill='white' dominant-baseline='middle'>${text}</text>
      </svg>`;
    }

    function getTimePartsInZone(date, timeZone) {
      const dtf = new Intl.DateTimeFormat('en-US', {
        timeZone,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });

      const parts = dtf.formatToParts(date);
      const map = {};
      for (const p of parts) map[p.type] = p.value;
      return {
        year: +map.year,
        month: +map.month,
        day: +map.day,
        hour: +map.hour,
        minute: +map.minute,
        second: +map.second
      };
    }

    function zonedTimeToUtc(year, monthIndex, day, hour, minute, timeZone) {
      let utcDate = new Date(Date.UTC(year, monthIndex, day, hour, minute, 0));
      for (let i = 0; i < 4; i++) {
        const tz = getTimePartsInZone(utcDate, timeZone);
        const asUTC = Date.UTC(tz.year, tz.month - 1, tz.day, tz.hour, tz.minute, tz.second);
        const target = Date.UTC(year, monthIndex, day, hour, minute, 0);
        const diff = target - asUTC;
        utcDate = new Date(utcDate.getTime() + diff);
      }
      return utcDate;
    }

    function convertToUserTime(dateStr, timeStr, sourceTimezone) {
      if (!dateStr || !timeStr || dateStr === '-' || timeStr === '-') return '-';

      const parts = dateStr.trim().split(' ');
      if (parts.length < 3) return timeStr;

      const day = parseInt(parts[0], 10);
      const month = monthMap[parts[1]];
      const year = parseInt(parts[2], 10);
      const [hour, minute] = timeStr.split(':').map(Number);

      if (isNaN(day) || month === undefined || isNaN(year) || isNaN(hour) || isNaN(minute)) {
        return timeStr;
      }

      try {
        const utcDate = zonedTimeToUtc(year, month, day, hour, minute, sourceTimezone);

        return new Intl.DateTimeFormat('ru-RU', {
          timeZone: userTimezone,
          hour: '2-digit',
          minute: '2-digit'
        }).format(utcDate);
      } catch (e) {
        return timeStr;
      }
    }

    function convertToUserDate(dateStr, timeStr, sourceTimezone) {
      if (!dateStr || !timeStr || dateStr === '-' || timeStr === '-') return dateStr;

      const parts = dateStr.trim().split(' ');
      if (parts.length < 3) return dateStr;

      const day = parseInt(parts[0], 10);
      const month = monthMap[parts[1]];
      const year = parseInt(parts[2], 10);
      const [hour, minute] = timeStr.split(':').map(Number);

      if (isNaN(day) || month === undefined || isNaN(year) || isNaN(hour) || isNaN(minute)) {
        return dateStr;
      }

      try {
        const utcDate = zonedTimeToUtc(year, month, day, hour, minute, sourceTimezone);

        return new Intl.DateTimeFormat('ru-RU', {
          timeZone: userTimezone,
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        }).format(utcDate);
      } catch (e) {
        return dateStr;
      }
    }

    function findNextRace() {
      const now = new Date();
      for (const race of races) {
        const raceStart = race.schedule?.[0];
        if (!raceStart) continue;
        const parts = raceStart.date.split(' ');
        if (parts.length < 3) continue;

        const day = parseInt(parts[0], 10);
        const month = monthMap[parts[1]];
        const year = parseInt(parts[2], 10);
        const [hour, minute] = raceStart.time.split(':').map(Number);

        try {
          const utcDate = zonedTimeToUtc(year, month, day, hour, minute, race.timezone);
          if (utcDate > now) return race.id;
        } catch(e) {}
      }
      return null;
    }

    function renderRaces() {
      const grid = document.getElementById('racesGrid');
      grid.innerHTML = '';

      const nextRaceId = findNextRace();

      races.forEach(race => {
        const card = document.createElement('div');
        card.className = 'race-card';
        card.id = `card-${race.id}`;
        card.onclick = () => showDetail(race.id);

        const nextChip = nextRaceId === race.id
          ? `<span style="background:#1b2a18;color:#7df58d;padding:4px 8px;border-radius:999px;font-weight:800;">NEXT</span>`
          : '';

        card.innerHTML = `
          <div class="card-head">
            <div class="flag">${race.flag}</div>
            <div class="card-meta">
              <div class="meta-top">
                <span>${race.month}</span>
                <span>ROUND ${race.round}</span>
                <span>${race.city}</span>
                ${nextChip}
              </div>
              <div class="date">${race.dateLabel}</div>
              <div class="country">${race.country}</div>
            </div>
          </div>

          <div class="track-wrap">
            <img
              class="track-image"
              src="${race.image}"
              alt="${race.circuit}"
              onerror="this.onerror=null;this.src=placeholderSvg('Track layout');"
            />
          </div>

          <div class="track-name">${race.circuit}</div>
        `;

        grid.appendChild(card);
      });
    }

    const pages = ['mainPage','detailPage','teamsPage','driversPage'];
    let currentPage = 'mainPage';
    let currentRace = null;

    function setPage(pageId) {
      pages.forEach(id => {
        document.getElementById(id).classList.remove('active');
      });
      document.getElementById(pageId).classList.add('active');
      currentPage = pageId;
      window.scrollTo(0, 0);

      if (tg?.BackButton) {
        if (pageId === 'mainPage') {
          tg.BackButton.hide();
        } else {
          tg.BackButton.show();
        }
      }
    }

    function showList(type) {
      haptic();
      if (type === 'teams') {
        renderTeamsList();
        setPage('teamsPage');
      } else {
        renderDriversList();
        setPage('driversPage');
      }
    }

    function showDetail(raceId) {
      haptic();
      currentRace = races.find(r => r.id === raceId);
      if (!currentRace) return;

      document.getElementById('detailRound').textContent = `ROUND ${currentRace.round} · ${currentRace.city}`;
      document.getElementById('detailTitle').textContent = currentRace.country;
      document.getElementById('detailCircuit').textContent = currentRace.circuit;
      document.getElementById('detailDate').textContent = currentRace.dateLabel;

      const detailImg = document.getElementById('detailTrackImage');
      detailImg.src = currentRace.image;
      detailImg.onerror = function () {
        this.onerror = null;
        this.src = placeholderSvg('Track layout');
      };

      const table = document.getElementById('scheduleTable');
      table.innerHTML = '';

      currentRace.schedule.forEach(item => {
        const localDate = convertToUserDate(item.date, item.time, currentRace.timezone);
        const localTime = convertToUserTime(item.date, item.time, currentRace.timezone);

        const row = document.createElement('div');
        row.className = 'schedule-item';
        row.innerHTML = `
          <div class="session-name">${item.session}</div>
          <div class="session-date">${localDate}</div>
          <div class="session-time">
            ${localTime}
            <span class="original-time">(${item.time} местное)</span>
          </div>
        `;
        table.appendChild(row);
      });

      setPage('detailPage');
    }

    function goBack() {
      haptic();
      if (currentPage === 'detailPage' || currentPage === 'teamsPage' || currentPage === 'driversPage') {
        setPage('mainPage');
      }
    }

    function shareRace() {
      haptic();
      if (!currentRace) return;

      let text = `🏎️ ${currentRace.countryRu}\n`;
      text += `📍 ${currentRace.circuit}\n`;
      text += `📅 ${currentRace.dateLabel}\n`;
      text += `🌍 Ваш часовой пояс: ${userTimezone}\n\n`;
      text += `📋 Расписание:\n`;

      currentRace.schedule.forEach(item => {
        const localDate = convertToUserDate(item.date, item.time, currentRace.timezone);
        const localTime = convertToUserTime(item.date, item.time, currentRace.timezone);
        text += `• ${item.session} — ${localDate} ${localTime}\n`;
      });

      const shareUrl = `https://t.me/share/url?url=${encodeURIComponent('F1 2026')}&text=${encodeURIComponent(text)}`;

      if (tg?.openTelegramLink) {
        tg.openTelegramLink(shareUrl);
      } else {
        window.open(shareUrl, '_blank');
      }
    }

    function scrollToNextRace() {
      haptic();
      const nextRaceId = findNextRace();
      if (!nextRaceId) return;
      const el = document.getElementById(`card-${nextRaceId}`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    if (tg?.BackButton) {
      tg.BackButton.onClick(() => {
        if (currentPage !== 'mainPage') goBack();
      });
    }

    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', e => {
      touchStartX = e.changedTouches[0].screenX;
    });

    document.addEventListener('touchend', e => {
      touchEndX = e.changedTouches[0].screenX;
      if (touchEndX - touchStartX > 100 && currentPage !== 'mainPage') {
        goBack();
      }
    });

    renderRaces();
    setPage('mainPage');
  </script>
